<template>
    <lightning-card>

        <div class="custom-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

        <!-- LEFT: TITLE -->
        <div class="header-title">
            Zone Coverage Analysis Report
        </div>

        <!-- RIGHT: LAST SYNC + BUTTON -->
        <div class="slds-grid slds-grid_vertical-align-center">

            <div class="last-sync slds-m-right_medium">
                <strong>As of</strong> {lastSyncAt}
            </div>

            <lightning-button 
                label="Export CSV"
                variant="brand"
                onclick={handleExport}>
            </lightning-button>

        </div>

    </div>

        <!-- 🔄 LOADING -->
        <template if:true={isLoading}>
            <div class="spinner">
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <!-- ❌ ERROR -->
        <template if:true={error}>
            <div class="error">
                {error}
            </div>
        </template>
        <template if:true={hasData}>
    <div class="slds-p-around_medium slds-box slds-theme_default slds-m-bottom_small">
        <!--<p><strong>Total Number of Visits :</strong> {totalZones}</p>-->
        <p><strong>Total Number of Zones :</strong> {totalZones}</p>
    </div>
</template>

        <!-- ✅ DATA TABLE -->
<template if:true={hasData}>
            <lightning-datatable
    key-field="id"
    data={tableData}
    columns={columns}
    onsort={handleSort}
    sorted-by={sortedBy}
    sorted-direction={sortedDirection}
    hide-checkbox-column>
</lightning-datatable>
        </template>
         <div class="slds-m-around_small slds-align_absolute-center">
    <lightning-button label="Previous" onclick={handlePrevious} disabled={isPreviousDisabled}></lightning-button>
    <span class="slds-m-horizontal_small">
        Page {currentPage}
    </span>
    <lightning-button label="Next" onclick={handleNext} disabled={isNextDisabled}></lightning-button>
</div>

    </lightning-card>
</template>
