<template>
    <lightning-card>

        <!-- 🔄 Loader -->
        <template if:true={isloading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>

        <!-- ❌ No Data -->
<template if:false={hasTeamData}>
                <div class="slds-p-around_medium slds-text-align_center">
                No Team Data Available
            </div>
        </template>

        <div class="custom-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

            <!-- LEFT -->
            <div class="header-title">
                Team Performance Summary Report
            </div>

            <!-- RIGHT -->
            <div class="slds-grid slds-grid_vertical-align-center">

                <div class="last-sync slds-m-right_medium">
                    <strong>As of</strong> {lastSync}
                </div>

                <lightning-button
                    label="Export CSV"
                    variant="brand"
                    onclick={handleExport}>
                </lightning-button>

            </div>
        </div>

        <!-- 📊 Datatable -->
<template if:true={hasTeamData}>
                <lightning-datatable
                key-field="id"
                data={teamTableData}
                columns={columns}
                show-row-number-column
                hide-checkbox-column>
            </lightning-datatable>

            <!-- Pagination -->
            <div class="pagination">

                <lightning-button
                    label="Previous"
                    onclick={handlePrevious}
                    disabled={isPreviousDisabled}>
                </lightning-button>

                <span class="page-info">
                    Page {currentPage} of {totalPages}
                </span>

                <lightning-button
                    label="Next"
                    onclick={handleNext}
                    disabled={isNextDisabled}>
                </lightning-button>

            </div>
        </template>

    </lightning-card>
</template>
