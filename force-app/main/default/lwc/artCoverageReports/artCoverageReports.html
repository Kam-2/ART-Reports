<template>
    <lightning-card>

        <!-- 🔄 Loading -->
        <template if:true={isloading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>

       <div class="custom-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

        <!-- LEFT: TITLE -->
        <div class="header-title">
            Ambassador Checkpoint Performance Reports
        </div>

        <!-- RIGHT: LAST SYNC + BUTTON -->
        <div class="slds-grid slds-grid_vertical-align-center">

            <div class="last-sync slds-m-right_medium">
                <strong>As of</strong> {lastSync}
            </div>

            <lightning-button 
                label="Export CSV"
                variant="brand"
                onclick={handleExport}>
            </lightning-button>

        </div>

    </div>

<template if:true={records.length}>
    <div class="slds-p-around_medium slds-box slds-theme_default slds-m-bottom_small">
        <p><strong>Overall Checkpoints Coverage %:</strong> {overallCoverage}%</p>
        <p><strong>Overall Checkpoints Missed %:</strong> {overallMissed}%</p>
        <p><strong>Total Checkpoints :</strong> {totalRecords}</p>
    </div>
</template>
        <!-- 📊 Data Table -->
        <template if:true={records.length}>
            <lightning-datatable
                key-field="id"
                data={paginatedRecords}
                columns={columns}
                 show-row-number-column
                 hide-checkbox-column
                onsort={handleSort}
                sorted-by={sortedBy}
                sorted-direction={sortDirection} >
            </lightning-datatable>
            <div class="pagination">
    <lightning-button 
        label="Previous" 
        onclick={handlePrevious}
        disabled={isPreviousDisabled}>
    </lightning-button>

    <span class="page-info">
        Page {currentPage} of {totalPages}
    </span>

    <lightning-button 
        label="Next" 
        onclick={handleNext}
        disabled={isNextDisabled}>
    </lightning-button>
</div>
        </template>

        <!-- ❗ No Data -->
        <template if:false={records.length}>
            <div class="slds-p-around_medium slds-text-align_center">
                No coverage data available
            </div>
        </template>
    </lightning-card>
</template>
